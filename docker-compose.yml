services:
  santipx:
    build:
      context: .
      dockerfile: Dockerfile
    image: santipx:latest
    container_name: santipx
    restart: unless-stopped
    ports:
      - "${SANTIPX_PORT:-8080}:8080"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8080
      # 如果服务器访问外部 AI API 必须走代理，可以在部署时打开下面这些环境变量：
      # HTTPS_PROXY: http://proxy.example.com:7890
      # HTTP_PROXY: http://proxy.example.com:7890
      # NO_PROXY: localhost,127.0.0.1
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
